[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "npm-10_x"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build"
]

[start]
cmd = "bash scripts/railway-start.sh"
